<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Amna 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #5e1a2b; --notebook-pink: #fdf0f2; --ribbon-color: #ff99ac; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', sans-serif; background-color: #000; color: white; overflow: hidden; }

        /* --- PAGE 1: NOTEBOOK --- */
        #notebookPage {
            position: fixed; inset: 0; background-color: var(--notebook-pink); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; box-sizing: border-box; border: 15px solid var(--notebook-pink);
            outline: 3px solid var(--ribbon-color); outline-offset: -20px;
            transition: transform 0.6s ease-in-out;
        }
        #notebookPage::before { content: '🎀'; position: absolute; top: 30px; left: 30px; font-size: 30px; }
        #notebookPage::after { content: '🎀'; position: absolute; bottom: 30px; right: 30px; font-size: 30px; }
        
        .notebook-content { font-family: 'Patrick Hand', cursive; color: #555; text-align: center; }
        .notebook-content p { border-bottom: 1px solid rgba(0,0,0,0.1); padding: 5px 0; margin: 10px 0; width: 250px; }

        .next-page-btn {
            margin-top: 40px; background: white; border: 2px solid var(--ribbon-color);
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- PAGE 2: SPOTIFY PLAYER --- */
        #app {
            display: none; height: 100vh; flex-direction: column;
            background: linear-gradient(to bottom, var(--bg-color) 0%, #121212 100%);
            padding: 20px 25px; box-sizing: border-box;
        }
        
        /* The Song "Cover" is now just a notebook page */
        .art-container {
            width: 100%; aspect-ratio: 1/1; 
            background: #fff8ee; color: #333; 
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            margin: 30px 0;
            font-family: 'Patrick Hand', cursive; 
            padding: 25px; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center; text-align: center; font-size: 19px;
            /* Lined paper effect */
            background-image: repeating-linear-gradient(#fff8ee 0px, #fff8ee 24px, #e8dcc4 25px);
        }

        .track-info { margin-top: -10px; }
        .track-info h2 { font-size: 26px; margin: 0; font-weight: 700; }
        .track-info p { color: #b3b3b3; margin: 5px 0 25px 0; font-size: 16px; }

        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 2px; }

        .time { display: flex; justify-content: space-between; font-size: 12px; color: #b3b3b3; margin: 10px 0 35px 0; }

        .controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .play-btn { background: white; color: black; width: 65px; height: 65px; border-radius: 50%; font-size: 25px; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .lyrics-card {
            margin-top: auto;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px 12px 0 0;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="notebookPage">
    <div class="notebook-content">
        <h2 style="color:var(--ribbon-color)">Happy Birthday Amna! 🎀</h2>
        <p>Your playlist notebook...</p>
        <p>Turn the page to see it!</p>
    </div>
    <button class="next-page-btn" onclick="openPlaylist()">
        <span style="color:var(--ribbon-color); font-size: 24px;">→</span>
        <span style="color:var(--ribbon-color); font-size: 10px; font-weight:700;">TURN PAGE</span>
    </button>
</div>

<div id="app">
    <div style="text-align:center; font-size: 11px; font-weight:700; opacity: 0.7; margin-top:10px;">PLAYING FROM YOUR LIBRARY</div>
    
    <div class="art-container" id="notebookCover">
        <p id="birthdayNote">Wish message will appear here...</p>
    </div>

    <div class="track-info">
        <h2 id="title">Song Title</h2>
        <p id="artist">Artist</p>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="time"><span id="currTime">0:00</span><span id="duration">0:00</span></div>

    <div class="controls">
        <button onclick="prev()" style="font-size:35px; background:none; color:white; border:none; cursor:pointer;">⏮</button>
        <button class="play-btn" onclick="togglePlay()" id="playIcon">▶</button>
        <button onclick="next()" style="font-size:35px; background:none; color:white; border:none; cursor:pointer;">⏭</button>
    </div>

    <div class="lyrics-card" id="lyricsCard">
        <span>Playlist Note</span>
        <span style="font-size: 10px; opacity: 0.6; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 10px;">Unique Wish on Every Song</span>
    </div>
</div>

<audio id="audio"></audio>

<script>
    const songs = [
        { 
            title: "Heaven And Back", 
            artist: "Chase Atlantic", 
            color: "#4a3c61", 
            file: "heaven_and_back.mp3", 
            note: "Happy Birthday Amna! 🌙 You’re a little bit of heaven. Stay wild and stay you. This year is yours!" 
        },
        { 
            title: "Swim", 
            artist: "Chase Atlantic", 
            color: "#1d3557", 
            file: "swim.mp3", 
            note: "Amna, you’re deeper than the ocean. 🌊 I hope you never stop swimming towards your dreams. Have the best birthday!" 
        },
        { 
            title: "Cafeteria Song", 
            artist: "Equestria Girls", 
            color: "#e056fd", 
            file: "cafeteria.mp3", 
            note: "To my favorite human! 🍦 Life is better when we're together like a catchy song. I hope your day is filled with laughter!" 
        },
        { 
            title: "Ladybug", 
            artist: "Lou and Lenni-Kim", 
            color: "#d63031", 
            file: "ladybug.mp3", 
            note: "You’re simply the best, up to the test when things go wrong! 🐞 Happy Birthday to my favorite superhero." 
        },
        { 
            title: "Under Our Spell", 
            artist: "The Dazzlings", 
            color: "#2d3436", 
            file: "spell.mp3", 
            note: "You definitely have me under your spell! ✨ Wishing you a birthday that's as magical and mesmerizing as you are. Keep shining, Amna!" 
        }
    ];

    let index = 0;
    const audio = document.getElementById('audio');

    function openPlaylist() {
        document.getElementById('notebookPage').style.transform = 'translateY(-100%)';
        setTimeout(() => {
            document.getElementById('notebookPage').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            updateUI(true);
        }, 600);
    }

    function updateUI(play) {
        const s = songs[index];
        document.getElementById('title').innerText = s.title;
        document.getElementById('artist').innerText = s.artist;
        document.getElementById('birthdayNote').innerText = s.note;
        document.getElementById('lyricsCard').style.backgroundColor = s.color;
        document.getElementById('app').style.background = `linear-gradient(to bottom, ${s.color} 0%, #121212 100%)`;
        
        audio.src = s.file;
        if(play) {
            audio.play().then(() => {
                document.getElementById('playIcon').innerText = '⏸';
            }).catch(e => {
                document.getElementById('playIcon').innerText = '▶';
            });
        }
    }

    function togglePlay() { 
        if(audio.paused) { audio.play(); document.getElementById('playIcon').innerText = '⏸'; }
        else { audio.pause(); document.getElementById('playIcon').innerText = '▶'; }
    }
    function next() { index = (index + 1) % songs.length; updateUI(true); }
    function prev() { index = (index - 1 + songs.length) % songs.length; updateUI(true); }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress').style.width = p + '%';
        document.getElementById('currTime').innerText = formatTime(audio.currentTime);
        document.getElementById('duration').innerText = formatTime(audio.duration);
    };
    function formatTime(sec) {
        if(!sec) return "0:00";
        let m = Math.floor(sec/60), s = Math.floor(sec%60);
        return m + ":" + (s < 10 ? "0" + s : s);
    }
</script>
</body>
</html>
